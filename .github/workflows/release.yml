name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package Module Zip and Prepare Standalone APK
        run: |
          python pack.py
          cp system/priv-app/MiuiCamera/MiuiCamera.apk PlatoCamera.apk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PlatoCamera-*.zip
            PlatoCamera.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## PlatoCamera ${{ github.ref_name }}
            
            Porting Xiaomi HyperOS Camera to AOSP ROMs for Xiaomi 12T (plato).
            
            ### 🆕 Changelog v1.4.7-Stable
            - **Universal AOSP Port Integration (Sevtinge v1.1.1)**: Integrated the universal 157 MB AOSP port APK featuring 7 DEX layers, full 12 MP (Pixel Binning) and 108 MP (Ultra HD Remosaic) capture support, Pro mode, Night mode, and Leica styles.
            - **Fix Startup Crashes & ANGLE NPE**: Automatic first-boot execution sets `angle_gl_driver_selection_values=native` for `com.android.camera` to prevent ANGLE initialization crashes on Android 15 AOSP ROMs lacking `com.android.angle`.
            - **Clean Package Footprint**: Removed corrupt `.idsig` files to prevent package manager scan failures.

            ### Requirements
            - **Device**: Xiaomi 12T (plato)
            - **ROM**: AOSP-based ROMs (Android 15-16)
            - **Root Manager**: KernelSU Next (recommended) or Magisk
            
            ---
            
            ### 🛠️ Step-by-Step Installation Guide (MANDATORY)
            
            Please follow these steps carefully to ensure the camera app launches successfully and the launcher icon appears:
            
            1. **Prerequisites (KernelSU & Hybrid Mount Users - CRITICAL)**:
               - Ensure you have the **`hybrid_mount`** (Hybrid Mount Meta-module) installed and active on your device.
               - **CRITICAL CONFIG STEP**: Open `/data/adb/hybrid-mount/config.toml` on your device and set `disable_umount = true`.
               - *Why?* By default, `hybrid_mount` unmounts module overlays for non-root apps. Setting `disable_umount = true` ensures `MiuiCamera.apk` remains visible to the camera process and system.
            
             2. **Flash Module**:
                - Download the attached module zip (e.g. `PlatoCamera-${{ github.ref_name }}.zip`) from below.
               - Flash the zip file in **KernelSU Manager** or **Magisk**.
            
            3. **Reboot (MANDATORY FIRST)**:
               - Reboot your device now.
               - *Why?* On some ROMs/devices, granting superuser permissions before the first reboot can trigger a bootloop or cause the package manager to fail. Always reboot first!
            
            4. **Grant Superuser (Root) Access (CRITICAL for KernelSU/SuSFS)**:
               - After your device boots up and the Camera app appears, open the **KernelSU Next** (or APatch) manager app.
               - Go to the **Superuser** tab (shield icon).
               - Find **Kamera** (`com.android.camera`) in the list and turn **ON** the Superuser access toggle.
               - If **ExtraPhoto** (`com.miui.extraphoto`) also appears in the list, enable Superuser access for it as well.
               - *Why?* KernelSU/SuSFS hide module files from non-root apps. Granting root access bypasses this namespace restriction so the apps can load their proprietary libraries. This also prevents crashes in filter/editor modes (which rely on ExtraPhoto).
            
            5. **Manual APK Installation for Launcher Icon (MANDATORY on AOSP)**:
               - On AOSP ROMs, the launcher often fails to scan or display icons for system apps injected via Magisk.
               - Download the standalone **`PlatoCamera.apk`** from below and install it manually.
               - This registers the app as a user app update, forcing the launcher icon to show up in your app drawer while still retaining all system libraries and permissions from the Magisk module.
            
            6. **Clear App Data (MANDATORY)**:
               - Go to **Settings -> Apps -> Kamera -> Storage** and tap **Clear Data / Clear Storage** (Hapus Penyimpanan/Data).
               - *Why?* This is required to reset cached configuration states so the camera app registers the new patches, enabling full 60 FPS video recording and resolving visual glitches.
               - Open the app, grant all runtime permissions, and enjoy!
               
            ---
            
            ### ❓ Troubleshooting
            
            - **Camera crashes immediately**: Double-check that Superuser access is correctly granted to `com.android.camera` in KernelSU.
            - **60 FPS option is missing**: Ensure you have performed Step 6 (Clear App Data) to clear cached camera configurations.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

