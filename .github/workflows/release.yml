name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package Module Zip and Prepare Standalone APK
        run: |
          python pack.py
          cp system/priv-app/MiuiCamera/MiuiCamera.apk PlatoCamera.apk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PlatoCamera-*.zip
            PlatoCamera.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## PlatoCamera ${{ github.ref_name }}
            
            Porting Xiaomi HyperOS Camera to AOSP ROMs for Xiaomi 12T (plato).
            
            ### 🆕 Changelog v1.4.7-Stable
            - **Universal AOSP Port Integration (Sevtinge v1.1.1)**: Integrated the universal 157 MB AOSP port APK featuring 7 DEX layers, full 12 MP (Pixel Binning) and 108 MP (Ultra HD Remosaic) capture support, Pro mode, Night mode, and Leica styles.
            - **Fix Startup Crashes & ANGLE NPE**: Automatic first-boot execution sets `angle_gl_driver_selection_values=native` for `com.android.camera` to prevent ANGLE initialization crashes on Android 15 AOSP ROMs lacking `com.android.angle`.
            - **Clean Package Footprint**: Removed corrupt `.idsig` files to prevent package manager scan failures.

            ### Requirements
            - **Device**: Xiaomi 12T (plato)
            - **ROM**: AOSP-based ROMs (Android 15-16)
            - **Root Manager**: KernelSU Next (recommended) or Magisk
            
            ### 🇮🇩 Panduan Ringkas (Bahasa Indonesia)
            1. **KernelSU + Hybrid Mount Users**: Wajib buka `/data/adb/hybrid-mount/config.toml` lalu ubah `disable_umount = true` lalu reboot.
            2. **Flash Modul**: Flash `PlatoCamera-${{ github.ref_name }}.zip` di KernelSU / Magisk lalu Reboot.
            3. **Akses Root**: Buka KernelSU -> Tab Superuser -> Aktifkan Root untuk **Kamera** (`com.android.camera`).
            4. **Hapus Data**: Masuk Pengaturan HP -> Aplikasi -> Kamera -> Hapus Data.
            
            > 💡 **Catatan File `PlatoCamera.apk`**: Ikon kamera sekarang **otomatis muncul** setelah flash zip. File `PlatoCamera.apk` di bawah sifatnya **Opsional (Cadangan saja)**.
            
            ---
            
            ### 🛠️ Step-by-Step Installation Guide (English)
            
            1. **Prerequisites (KernelSU & Hybrid Mount Users - CRITICAL)**:
               - Open `/data/adb/hybrid-mount/config.toml` on your device and set `disable_umount = true`.
            
             2. **Flash Module**:
                - Download `PlatoCamera-${{ github.ref_name }}.zip` below and flash in KernelSU or Magisk.
            
             3. **Reboot**: Restart your device.
            
             4. **Grant Superuser (Root) Access**:
                - Open **KernelSU Next** -> **Superuser** -> Enable Root access for **Kamera** (`com.android.camera`).
            
             5. **Clear App Data**:
                - Go to **Settings -> Apps -> Camera -> Clear Data**.
                
             > 💡 **Note on `PlatoCamera.apk`**: The standalone APK is purely **optional (backup)**. The launcher icon appears automatically after flashing the ZIP.
               
            ---
            
            ### ❓ Troubleshooting
            
            - **Camera crashes immediately**: Double-check that Superuser access is correctly granted to `com.android.camera` in KernelSU.
            - **60 FPS option is missing**: Ensure you have performed Step 6 (Clear App Data) to clear cached camera configurations.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

